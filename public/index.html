<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Moja Gra Online - Canvas & Combat</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { display: block; cursor: crosshair; }
        #ui { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            background: rgba(0,0,0,0.7); 
            padding: 15px; 
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: none;
        }
        b { color: #00d4ff; }
    </style>
</head>
<body>
    <div id="ui">
        Ruch: <b>WSAD</b><br>
        Strzał: <b>LPM</b><br>
        <hr>
        Grasz jako: <span id="myName">...</span>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const myNameSpan = document.getElementById('myName');

        // Ustawienie wielkości płótna na cały ekran
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let players = {};
        let bullets = [];
        const myName = "Gracz_" + Math.floor(Math.random() * 100);
        myNameSpan.innerText = myName;

        // Powiadomienie serwera o dołączeniu
        socket.emit('join_game', { name: myName });

        // Odbieranie pełnego stanu świata (gracze + pociski)
        socket.on('state', (state) => {
            players = state.players;
            bullets = state.bullets;
        });

        // Obsługa klawiatury
        const keys = {};
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // Obsługa strzelania (LPM)
        window.addEventListener('mousedown', (e) => {
            // Wysyłamy współrzędne kliknięcia, aby serwer wyliczył kąt strzału
            socket.emit('shoot', { x: e.clientX, y: e.clientY });
        });

        function update() {
            const movement = { x: 0, y: 0 };
            const speed = 4;

            if (keys['w']) movement.y -= speed;
            if (keys['s']) movement.y += speed;
            if (keys['a']) movement.x -= speed;
            if (keys['d']) movement.x += speed;

            if (movement.x !== 0 || movement.y !== 0) {
                socket.emit('move', movement);
            }
        }

        function draw() {
            // Czyścimy ekran
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Rysujemy pociski
            ctx.fillStyle = "#ffff00"; // Żółte pociski
            bullets.forEach(bullet => {
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, 5, 0, Math.PI * 2);
                ctx.fill();
                // Opcjonalna poświata
                ctx.shadowBlur = 10;
                ctx.shadowColor = "yellow";
            });
            ctx.shadowBlur = 0; // Reset poświaty dla graczy

            // 2. Rysujemy graczy
            for (let id in players) {
                const p = players[id];
                
                // Cień pod graczem
                ctx.fillStyle = "rgba(0,0,0,0.3)";
                ctx.fillRect(p.x + 4, p.y + 4, 40, 40);

                // Kwadrat gracza
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 40, 40);

                // Nick nad głową
                ctx.fillStyle = "white";
                ctx.font = "bold 14px Arial";
                ctx.textAlign = "center";
                ctx.fillText(p.name, p.x + 20, p.y - 12);

                // Wyróżnienie "mnie" obramowaniem
                if (id === socket.id) {
                    ctx.strokeStyle = "#fff";
                    ctx.lineWidth = 3;
                    ctx.strokeRect(p.x, p.y, 40, 40);
                }
            }

            update(); 
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
