<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Arena Multiplayer - Walka o Ranking</title>
    <style>
        body { 
            margin: 0; 
            background: #111; 
            overflow: hidden; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        canvas { display: block; cursor: crosshair; }
        
        /* Ekran logowania */
        #loginScreen {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, #222 0%, #111 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #444;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input { 
            padding: 12px; 
            font-size: 18px; 
            border-radius: 5px; 
            border: 1px solid #555; 
            background: #000; 
            color: #fff; 
            margin: 20px 0;
            width: 250px;
            outline: none;
        }
        input:focus { border-color: #00d4ff; }
        button { 
            padding: 12px 40px; 
            font-size: 18px; 
            cursor: pointer; 
            background: #00d4ff; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            transition: transform 0.2s, background 0.2s;
        }
        button:hover { background: #00b8e6; transform: scale(1.05); }

        #hud { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            pointer-events: none; 
            text-shadow: 1px 1px 2px black;
            z-index: 10;
        }
        #leaderboard {
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: rgba(0, 0, 0, 0.7);
            padding: 15px; 
            border-radius: 10px; 
            min-width: 180px; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            z-index: 10;
        }
        .score-row { 
            display: flex; 
            justify-content: space-between; 
            margin: 5px 0; 
            font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 2px;
        }

        #weaponUI {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.7);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #444;
            backdrop-filter: blur(10px);
            z-index: 20;
        }
        .weapon-slot {
            padding: 8px 15px;
            background: #222;
            border: 2px solid #444;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            color: #666;
            transition: all 0.2s;
        }
        .weapon-slot.active {
            border-color: #00d4ff;
            color: white;
            background: #333;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        #minimapContainer {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #444;
            border-radius: 8px;
            padding: 8px;
            z-index: 10;
        }
        #minimap {
            width: 160px;
            height: 160px;
            background: #000;
            display: block;
            border: 1px solid #333;
        }
        #legend {
            margin-top: 8px;
            font-size: 11px;
            color: #ccc;
        }
        .leg-item { display: flex; align-items: center; margin: 3px 0; }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
        
        h3 { margin: 0 0 10px 0; font-size: 16px; color: #00d4ff; text-align: center; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h1>ARENA ONLINE</h1>
            <p>Wpisz swój pseudonim, aby dołączyć</p>
            <input type="text" id="nickInput" placeholder="Twój Nick..." maxlength="12">
            <br>
            <button id="startButton">WEJDŹ DO GRY</button>
        </div>
    </div>

    <div id="hud">
        Ruch: <b>WSAD</b><br>
        Strzał: <b>LPM</b><br>
        Broń: <b>1, 2, 3</b>
    </div>

    <div id="leaderboard">
        <h3>RANKING</h3>
        <div id="scoresList"></div>
    </div>

    <div id="weaponUI">
        <div id="slot-pistol" class="weapon-slot active">1: Pistolet</div>
        <div id="slot-shotgun" class="weapon-slot">2: Shotgun</div>
        <div id="slot-sniper" class="weapon-slot">3: Snajperka</div>
    </div>

    <div id="minimapContainer">
        <canvas id="minimap" width="160" height="160"></canvas>
        <div id="legend">
            <div class="leg-item"><div class="dot" style="background:#2ecc71"></div> +40 HP (Apteczka)</div>
            <div class="leg-item"><div class="dot" style="background:#00d4ff"></div> Speed Boost (7s)</div>
            <div class="leg-item"><div class="dot" style="background:#ff0000"></div> Przeciwnik</div>
            <div class="leg-item"><div class="dot" style="background:#ffff00"></div> Ty</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const miniCanvas = document.getElementById('minimap');
        const miniCtx = miniCanvas.getContext('2d');
        
        const loginScreen = document.getElementById('loginScreen');
        const nickInput = document.getElementById('nickInput');
        const startButton = document.getElementById('startButton');
        const scoresList = document.getElementById('scoresList');

        let isGameStarted = false;
        let players = {};
        let bullets = [];
        let powerups = [];
        let walls = [];
        let particles = [];
        let lastMyHp = 100;
        let shakeAmount = 0;
        const MAP_SIZE = 2000;

        // 1. BLOKADA MENU KONTEKSTOWEGO (PPM)
        window.addEventListener('contextmenu', (e) => e.preventDefault());

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function createExplosion(x, y, color) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1.0,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        startButton.onclick = () => {
            const name = nickInput.value.trim();
            if (name.length >= 2) {
                loginScreen.style.display = 'none';
                isGameStarted = true;
                socket.emit('join_game', { name: name });
                requestAnimationFrame(draw);
            } else {
                alert("Nick musi mieć minimum 2 znaki!");
            }
        };

        socket.on('state', (state) => {
            const myPlayer = state.players[socket.id];
            if (myPlayer) {
                if (myPlayer.hp < lastMyHp) {
                    shakeAmount = 12;
                    createExplosion(myPlayer.x + 20, myPlayer.y + 20, myPlayer.color);
                }
                lastMyHp = myPlayer.hp;
            }
            players = state.players;
            bullets = state.bullets;
            powerups = state.powerups;
            walls = state.walls;
            updateLeaderboard();
        });

        function updateLeaderboard() {
            const sorted = Object.values(players)
                .sort((a, b) => b.score - a.score)
                .slice(0, 5);
            scoresList.innerHTML = sorted.map(p => `
                <div class="score-row">
                    <span>${p.name}</span>
                    <b style="color: #00d4ff;">${p.score}</b>
                </div>
            `).join('');
        }

        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            let newWeapon = null;
            if (e.key === '1') newWeapon = 'pistol';
            if (e.key === '2') newWeapon = 'shotgun';
            if (e.key === '3') newWeapon = 'sniper';

            if (newWeapon && isGameStarted) {
                socket.emit('change_weapon', newWeapon);
                document.querySelectorAll('.weapon-slot').forEach(el => el.classList.remove('active'));
                const slot = document.getElementById(`slot-${newWeapon}`);
                if(slot) slot.classList.add('active');
            }
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // 2. STRZELANIE TYLKO LPM (e.button === 0)
        window.onmousedown = (e) => {
            if (!isGameStarted || e.button !== 0) return;
            const myPlayer = players[socket.id];
            if (!myPlayer) return;
            const camX = canvas.width / 2 - myPlayer.x - 20;
            const camY = canvas.height / 2 - myPlayer.y - 20;
            socket.emit('shoot', { x: e.clientX - camX, y: e.clientY - camY });
        };

        function updateMovement() {
            let dx = 0, dy = 0;
            if (keys['w']) dy -= 1;
            if (keys['s']) dy += 1;
            if (keys['a']) dx -= 1;
            if (keys['d']) dx += 1;
            if (dx !== 0 || dy !== 0) {
                const distance = Math.hypot(dx, dy);
                socket.emit('move', { x: dx / distance, y: dy / distance });
            }
        }

        function drawMinimap() {
            miniCtx.clearRect(0, 0, miniCanvas.width, miniCanvas.height);
            const scale = miniCanvas.width / MAP_SIZE;
            miniCtx.fillStyle = "#444";
            walls.forEach(w => miniCtx.fillRect(w.x * scale, w.y * scale, w.w * scale, w.h * scale));
            for (let id in players) {
                const p = players[id];
                miniCtx.fillStyle = id === socket.id ? "#ffff00" : "#ff0000";
                miniCtx.beginPath();
                miniCtx.arc(p.x * scale, p.y * scale, 3, 0, Math.PI * 2);
                miniCtx.fill();
            }
        }

        function draw() {
            if (!isGameStarted) return;
            const myPlayer = players[socket.id];
            if (!myPlayer) { requestAnimationFrame(draw); return; }

            let camX = canvas.width / 2 - myPlayer.x - 20;
            let camY = canvas.height / 2 - myPlayer.y - 20;
            if (shakeAmount > 0) {
                camX += (Math.random() - 0.5) * shakeAmount;
                camY += (Math.random() - 0.5) * shakeAmount;
                shakeAmount *= 0.9;
                if (shakeAmount < 0.2) shakeAmount = 0;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(camX, camY);

            ctx.fillStyle = "#151515";
            ctx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);
            ctx.beginPath();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
            for (let x = 0; x <= MAP_SIZE; x += 100) { ctx.moveTo(x, 0); ctx.lineTo(x, MAP_SIZE); }
            for (let y = 0; y <= MAP_SIZE; y += 100) { ctx.moveTo(0, y); ctx.lineTo(MAP_SIZE, y); }
            ctx.stroke();

            ctx.fillStyle = "#333";
            walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

            powerups.forEach(pu => {
                ctx.beginPath();
                ctx.fillStyle = pu.type === 'health' ? "#2ecc71" : "#00d4ff";
                ctx.arc(pu.x, pu.y, 10, 0, Math.PI * 2);
                ctx.fill();
            });

            particles.forEach((p, index) => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if (p.life <= 0) particles.splice(index, 1);
            });
            ctx.globalAlpha = 1.0;

            // 3. ANIMOWANE POCISKI (LASERY)
            bullets.forEach(b => {
                ctx.strokeStyle = "yellow";
                ctx.lineWidth = 3;
                ctx.lineCap = "round";
                ctx.beginPath();
                ctx.moveTo(b.x, b.y);
                // Rysujemy linię o długości 15px w kierunku lotu
                ctx.lineTo(b.x - b.vx * 1.5, b.y - b.vy * 1.5);
                ctx.stroke();
            });

            for (let id in players) {
                const p = players[id];
                const isFlashing = p.lastHit && (Date.now() - p.lastHit < 100);
                ctx.fillStyle = isFlashing ? "white" : p.color;
                ctx.fillRect(p.x, p.y, 40, 40);

                ctx.fillStyle = "#222";
                ctx.fillRect(p.x, p.y - 12, 40, 6);
                ctx.fillStyle = p.hp > 30 ? "#2ecc71" : "#e74c3c";
                ctx.fillRect(p.x, p.y - 12, (p.hp / 100) * 40, 6);

                ctx.fillStyle = "white";
                ctx.font = "bold 13px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(p.name, p.x + 20, p.y - 20);

                if (id === socket.id) {
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 2;
                    ctx.strokeRect(p.x - 2, p.y - 2, 44, 44);
                }
            }

            ctx.restore();
            drawMinimap();
            updateMovement();
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
