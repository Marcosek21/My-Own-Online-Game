<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Arena Multiplayer - Walka o Ranking</title>
    <style>
        body { 
            margin: 0; 
            background: #111; 
            overflow: hidden; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        canvas { display: block; cursor: crosshair; }
        
        /* Ekran logowania */
        #loginScreen {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, #222 0%, #111 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #444;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input { 
            padding: 12px; 
            font-size: 18px; 
            border-radius: 5px; 
            border: 1px solid #555; 
            background: #000; 
            color: #fff; 
            margin: 20px 0;
            width: 250px;
            outline: none;
        }
        input:focus { border-color: #00d4ff; }
        button { 
            padding: 12px 40px; 
            font-size: 18px; 
            cursor: pointer; 
            background: #00d4ff; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            transition: transform 0.2s, background 0.2s;
        }
        button:hover { background: #00b8e6; transform: scale(1.05); }

        /* Interfejs w grze (HUD) */
        #hud { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            pointer-events: none; 
            text-shadow: 1px 1px 2px black;
        }
        #leaderboard {
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: rgba(0, 0, 0, 0.7);
            padding: 15px; 
            border-radius: 10px; 
            min-width: 180px; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        .score-row { 
            display: flex; 
            justify-content: space-between; 
            margin: 5px 0; 
            font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 2px;
        }
        h3 { margin: 0 0 10px 0; font-size: 16px; color: #00d4ff; text-align: center; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h1>ARENA ONLINE</h1>
            <p>Wpisz swój pseudonim, aby dołączyć</p>
            <input type="text" id="nickInput" placeholder="Twój Nick..." maxlength="12">
            <br>
            <button id="startButton">WEJDŹ DO GRY</button>
        </div>
    </div>

    <div id="hud">
        Ruch: <b>WSAD</b><br>
        Strzał: <b>LPM</b>
    </div>

    <div id="leaderboard">
        <h3>RANKING</h3>
        <div id="scoresList"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const loginScreen = document.getElementById('loginScreen');
        const nickInput = document.getElementById('nickInput');
        const startButton = document.getElementById('startButton');
        const scoresList = document.getElementById('scoresList');

        let isGameStarted = false;
        let players = {};
        let bullets = [];

        // Dopasowanie canvasu
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // LOGOWANIE
        startButton.onclick = () => {
            const name = nickInput.value.trim();
            if (name.length >= 2) {
                loginScreen.style.display = 'none';
                isGameStarted = true;
                socket.emit('join_game', { name: name });
                requestAnimationFrame(draw);
            } else {
                alert("Nick musi mieć minimum 2 znaki!");
            }
        };

        // ODBIERANIE STANU Z SERWERA
        socket.on('state', (state) => {
            players = state.players;
            bullets = state.bullets;
            updateLeaderboard();
        });

        function updateLeaderboard() {
            const sorted = Object.values(players)
                .sort((a, b) => b.score - a.score)
                .slice(0, 5);
            
            scoresList.innerHTML = sorted.map(p => `
                <div class="score-row">
                    <span>${p.name}</span>
                    <b style="color: #00d4ff;">${p.score}</b>
                </div>
            `).join('');
        }

        // STEROWANIE
        const keys = {};
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        window.addEventListener('mousedown', (e) => {
            if (!isGameStarted) return;
            socket.emit('shoot', { x: e.clientX, y: e.clientY });
        });

        function updateMovement() {
            const movement = { x: 0, y: 0 };
            const speed = 5;

            if (keys['w']) movement.y -= speed;
            if (keys['s']) movement.y += speed;
            if (keys['a']) movement.x -= speed;
            if (keys['d']) movement.x += speed;

            if (movement.x !== 0 || movement.y !== 0) {
                socket.emit('move', movement);
            }
        }

        // RYSOWANIE
        function draw() {
            if (!isGameStarted) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Pociski
            ctx.fillStyle = "yellow";
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            // 2. Gracze
            for (let id in players) {
                const p = players[id];

                // Kwadrat gracza
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 40, 40);

                // Pasek życia (HP)
                const hpWidth = 40;
                const hpHeight = 6;
                ctx.fillStyle = "#333";
                ctx.fillRect(p.x, p.y - 12, hpWidth, hpHeight); // Tło paska
                
                const currentHpWidth = (p.hp / 100) * hpWidth;
                ctx.fillStyle = p.hp > 40 ? "#2ecc71" : "#e74c3c"; // Zielony lub czerwony
                ctx.fillRect(p.x, p.y - 12, currentHpWidth, hpHeight);

                // Nick i wynik
                ctx.fillStyle = "white";
                ctx.font = "bold 13px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(`${p.name}`, p.x + 20, p.y - 20);

                // Obramowanie Twojej postaci
                if (id === socket.id) {
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 2;
                    ctx.strokeRect(p.x - 2, p.y - 2, 44, 44);
                }
            }

            updateMovement();
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
